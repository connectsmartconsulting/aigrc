# NIST AI Risk Management Framework 1.0 (2023) + Generative AI Profile (NIST AI 600-1, 2024)
# Source: https://www.nist.gov/itl/ai-risk-management-framework
# Reviewed: 2026-04-23. Next scheduled review: 2026-07-23.

framework: NIST AI RMF
version: "1.0 + GenAI Profile 2024"
last_reviewed: "2026-04-23"

functions:
  GOVERN:
    description: "Culture of risk management is cultivated and present."
    subcategories:
      - id: "GOVERN 1.1"
        title: "Legal and regulatory requirements involving AI are understood, managed, and documented."
        aigrc_coverage: "planned_v0.4"
      - id: "GOVERN 4.1"
        title: "Organizational policies and practices are in place to foster a critical thinking and safety-first mindset."
        aigrc_coverage: "out_of_scope (process, not testable)"

  MAP:
    description: "Context is recognized and risks related to context are identified."
    subcategories:
      - id: "MAP 2.3"
        title: "Scientific integrity and TEVV considerations are identified and documented."
        aigrc_coverage: "planned_v0.4"

  MEASURE:
    description: "Appropriate methods and metrics are identified and applied."
    subcategories:
      - id: "MEASURE 2.6"
        title: "AI system safety is evaluated and documented."
        aigrc_coverage: "live_v0.1"
        aigrc_checks: ["prompt-injection"]
      - id: "MEASURE 2.7"
        title: "AI system security and resilience are evaluated and documented."
        aigrc_coverage: "live_v0.1"
        aigrc_checks: ["prompt-injection"]
      - id: "MEASURE 2.8"
        title: "Risks associated with transparency and accountability are examined and documented."
        aigrc_coverage: "planned_v0.3"
      - id: "MEASURE 2.9"
        title: "The AI model is explained, validated, and documented."
        aigrc_coverage: "planned_v0.3"
      - id: "MEASURE 2.10"
        title: "Privacy risk of the AI system is examined and documented."
        aigrc_coverage: "planned_v0.2"
        aigrc_checks_planned: ["pii-leakage"]
      - id: "MEASURE 2.11"
        title: "Fairness and bias are evaluated and results are documented."
        aigrc_coverage: "planned_v0.3"
      - id: "MEASURE 2.12"
        title: "Environmental impact and sustainability of AI model training and management activities are assessed and documented."
        aigrc_coverage: "out_of_scope"
      - id: "MEASURE 2.13"
        title: "Effectiveness of the employed TEVV metrics and processes in the MEASURE function are evaluated and documented."
        aigrc_coverage: "planned_v0.4"

  MANAGE:
    description: "Risks are prioritized and acted upon based on a projected impact."
    subcategories:
      - id: "MANAGE 2.3"
        title: "Procedures are followed to respond to and recover from a previously unknown risk when it is identified."
        aigrc_coverage: "out_of_scope (incident response)"
