name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check aigrc tests

      - name: Test
        run: pytest -v

      - name: Smoke test CLI (offline)
        run: |
          aigrc version
          aigrc list
          aigrc check prompt-injection --target mock://moderate --offline \
            --report-json /tmp/aigrc-ci.json --report-md /tmp/aigrc-ci.md
          test -f /tmp/aigrc-ci.json
          test -f /tmp/aigrc-ci.md
